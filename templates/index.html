<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhoWins — Sports Matchup Analyzer</title>
  <meta name="description" content="AI-powered sports matchup analysis. Skills, accolades, mindset, and a straight pick.">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<header>
  <a href="/" class="logo">🏆 WhoWins</a>
  <nav class="header-nav">
    <a href="/journal" class="nav-link">Journal</a>
    <a href="/logout" class="nav-link">Logout</a>
  </nav>
</header>

<main>
  <!-- ── Input form ── -->
  <div id="formSection">
    <p class="tagline">AI-powered matchup analysis for every sport</p>
    <form id="matchupForm">
      <div class="form-card">
        <div class="field">
          <label>Sport</label>
          <input type="text" id="sport" placeholder="e.g. Boxing, NBA, NFL, Tennis, MMA…" required>
        </div>

        <div class="vs-row">
          <div class="field">
            <label>Competitor / Team A</label>
            <input type="text" id="comp1" placeholder="e.g. Canelo Álvarez" required>
          </div>
          <div class="vs-badge">VS</div>
          <div class="field">
            <label>Competitor / Team B</label>
            <input type="text" id="comp2" placeholder="e.g. Terence Crawford" required>
          </div>
        </div>

        <div class="field">
          <label>Extra context <span class="optional">(optional)</span></label>
          <textarea id="context" rows="2" placeholder="Injury news, venue, specific date, recent form…"></textarea>
        </div>

        <button type="submit" id="analyzeBtn">
          <span id="btnText">Analyze Matchup</span>
          <span id="btnLoader" style="display:none">Analyzing…</span>
        </button>
      </div>
    </form>
  </div>

  <!-- ── Loading state ── -->
  <div id="loadingSection" style="display:none">
    <div class="loading-card">
      <div class="loading-vs">
        <span id="loadName1" class="load-name"></span>
        <span class="load-vs">VS</span>
        <span id="loadName2" class="load-name"></span>
      </div>
      <div class="loading-dots">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <p class="loading-msg" id="loadingMsg">Pulling every stat, record, and detail we can find…</p>
    </div>
  </div>

  <!-- ── Result ── -->
  <div id="resultSection" style="display:none">

    <!-- Win probability header -->
    <div class="prob-card">
      <div class="prob-competitor" id="probA">
        <div class="prob-name" id="probNameA"></div>
        <div class="prob-pct" id="probPctA">—</div>
      </div>
      <div class="prob-bar-wrap">
        <div class="prob-bar">
          <div class="prob-fill-a" id="probFillA"></div>
          <div class="prob-fill-b" id="probFillB"></div>
        </div>
        <div class="prob-winner-badge" id="probWinnerBadge" style="display:none"></div>
      </div>
      <div class="prob-competitor prob-right" id="probB">
        <div class="prob-name" id="probNameB"></div>
        <div class="prob-pct" id="probPctB">—</div>
      </div>
    </div>

    <!-- Analysis sections grid -->
    <div class="sections-grid" id="sectionsGrid"></div>

    <!-- Actions -->
    <div class="result-actions">
      <button class="btn-action" onclick="copyResult()">📋 Copy Analysis</button>
      <button class="btn-action btn-new-search" onclick="newSearch()">🔄 New Search</button>
      <span class="copied-msg" id="copiedMsg">Copied!</span>
    </div>

  </div>
</main>

<script src="/static/js/app.js"></script>
</body>
</html>
