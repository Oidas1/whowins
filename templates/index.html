<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhoWins — Sports Matchup Analyzer</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<header>
  <a href="/" class="logo">🏆 WhoWins</a>
  <nav class="header-nav">
    <a href="/journal" class="nav-link">Journal</a>
    <a href="/logout" class="nav-link">Logout</a>
  </nav>
</header>

<main>

  <!-- Form -->
  <div id="formSection">
    <p class="tagline">Enter any sport and two competitors</p>
    <form id="matchupForm">
      <div class="form-card">
        <div class="field">
          <label>Sport</label>
          <input type="text" id="sport" placeholder="e.g. Boxing, NBA, NFL, Tennis, MMA…" required>
        </div>
        <div class="vs-row">
          <div class="field">
            <label>Competitor / Team A</label>
            <input type="text" id="comp1" placeholder="Name" required>
          </div>
          <div class="vs-badge">VS</div>
          <div class="field">
            <label>Competitor / Team B</label>
            <input type="text" id="comp2" placeholder="Name" required>
          </div>
        </div>
        <div class="field">
          <label>Extra context <span class="optional">(optional)</span></label>
          <textarea id="context" rows="2" placeholder="Injuries, venue, date…"></textarea>
        </div>
        <button type="submit" id="analyzeBtn">Get Prediction</button>
      </div>
    </form>
  </div>

  <!-- Loading -->
  <div id="loadingSection" style="display:none">
    <div class="loading-card">
      <div class="loading-vs">
        <span id="loadName1" class="load-name"></span>
        <span class="load-vs">VS</span>
        <span id="loadName2" class="load-name"></span>
      </div>
      <div class="loading-dots">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <p class="loading-msg" id="loadingMsg">Analyzing…</p>
    </div>
  </div>

  <!-- Result -->
  <div id="resultSection" style="display:none">

    <!-- Big probability display -->
    <div class="result-card">
      <div class="competitors-row">
        <div class="comp-block" id="compBlockA">
          <div class="comp-name" id="compNameA"></div>
          <div class="comp-pct" id="compPctA">—</div>
          <div class="comp-label">Win Probability</div>
        </div>
        <div class="divider-col">
          <div class="divider-line"></div>
          <div class="divider-vs">VS</div>
          <div class="divider-line"></div>
        </div>
        <div class="comp-block" id="compBlockB">
          <div class="comp-name" id="compNameB"></div>
          <div class="comp-pct" id="compPctB">—</div>
          <div class="comp-label">Win Probability</div>
        </div>
      </div>

      <!-- Probability bar -->
      <div class="prob-bar-outer">
        <div class="prob-fill-a" id="probFillA"></div>
        <div class="prob-fill-b" id="probFillB"></div>
      </div>

      <!-- Confidence badge -->
      <div class="conf-row" id="confRow" style="display:none">
        <span class="conf-badge-big" id="confBadge"></span>
      </div>
    </div>

    <div class="result-actions">
      <button class="btn-action btn-new-search" onclick="newSearch()">🔄 New Search</button>
      <button class="btn-action" onclick="copyResult()">📋 Copy</button>
      <span class="copied-msg" id="copiedMsg">Copied!</span>
    </div>

  </div>

</main>

<script src="/static/js/app.js"></script>
</body>
</html>
