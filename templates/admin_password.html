<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhoWins — Current Password</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<header>
  <div class="logo">🏆 WhoWins</div>
  <p class="tagline">Admin — Current Password</p>
</header>
<main>
  <div class="login-card" style="text-align:center;">
    <p style="color:var(--muted);font-size:0.8rem;letter-spacing:1px;text-transform:uppercase;">Current site password</p>
    <p style="font-size:2rem;font-weight:900;color:var(--accent);letter-spacing:3px;">{{ password }}</p>
    <p style="color:var(--muted);font-size:0.82rem;">This rotates automatically each time someone logs in.</p>
  </div>
</main>
</body>
</html>
